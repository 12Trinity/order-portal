<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9f7f4;
            color: #3a3a3a;
            padding-bottom: 200px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #e8e4df;
            color: #3a3a3a;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header .account-name {
            font-size: 16px;
            color: #252f42;
        }

        .delivery-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(139, 125, 107, 0.12);
        }

        .delivery-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #3a3a3a;
        }

        .pickup-note {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            color: #666;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
        }

        .brand-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .brand-tab {
            flex: 1;
            padding: 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .brand-tab:hover {
            border-color: #adb5bd;
        }

        .brand-tab.active {
            /* Styles handled inline for brand-specific colors */
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(139, 125, 107, 0.12);
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: #3a3a3a;
        }

        .product-details {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .product-price {
            color: #8b7d6b;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 20px;
            font-weight: 600;
            color: #3a3a3a;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            border-color: #be835c;
            color: #be835c;
        }

        .qty-display {
            font-size: 18px;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: #be835c;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-to-cart-btn:hover {
            background: #a67250;
        }

        .add-to-cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .cart-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-top: 30px;
            box-shadow: 0 2px 8px rgba(139, 125, 107, 0.12);
        }

        .cart-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #3a3a3a;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .cart-item-details {
            color: #666;
            font-size: 14px;
        }

        .cart-item-price {
            font-weight: 700;
            color: #be835c;
            margin-right: 15px;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-top: 2px solid #252f42;
            margin-top: 20px;
            font-size: 24px;
            font-weight: 700;
        }

        .cart-total-label {
            color: #252f42;
        }

        .cart-total-amount {
            color: #be835c;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #252f42;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: #1a2230;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 {
            color: #252f42;
            margin-bottom: 15px;
        }

        .modal p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .modal ul {
            margin: 10px 0 10px 20px;
        }

        .modal li {
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: #be835c;
            color: white;
        }

        .modal-btn.secondary {
            background: #e0e0e0;
            color: #252f42;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .admin-selector {
            margin-bottom: 25px;
        }

        .admin-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─────────────────────────────────────────────────────────────────────────
        // PRODUCT META — one entry per product.
        // ── Helper: derive product ID from name ──────────────────────────────
        function makeProductId(name) {
            return name
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '')
                .substring(0, 40);
        }

        // ── Helper: derive brand from name ────────────────────────────────────
        function getBrand(name) {
            if (name.toLowerCase().includes('grange')) return 'The Grange';
            return 'Spirit of York';
        }

        // PRODUCT META — one entry per product.
        function OrderPortal() {
            const [accountCode, setAccountCode] = useState('');
            // adminMode: tracks whether the user originally arrived as ADMIN001.
            // accountCode can change (when admin selects an account to order on behalf of),
            // but adminMode stays true so admin-only UI keeps working.
            const [adminMode, setAdminMode] = useState(false);
            const [accountName, setAccountName] = useState('');
            const [accountType, setAccountType] = useState('');
            const [accountAddress, setAccountAddress] = useState('');
            const [accountLicense, setAccountLicense] = useState('');
            const [selectedAccountForAuth, setSelectedAccountForAuth] = useState('ADMIN001');
            const [selectedAccountForWhisky, setSelectedAccountForWhisky] = useState('ADMIN001');
            const [allAccounts, setAllAccounts] = useState([]);
            const [selectedBrand, setSelectedBrand] = useState('Spirit of York');
            const [deliveryDate, setDeliveryDate] = useState('');
            const [customDeliveryDate, setCustomDeliveryDate] = useState('');
            const [cart, setCart] = useState([]);
            const [quantities, setQuantities] = useState({});
            const [editingQuantity, setEditingQuantity] = useState(null);
            const [tempQuantity, setTempQuantity] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [csvLoaded, setCsvLoaded] = useState(false);
            const [message, setMessage] = useState({ type: '', text: '' });
            const [showWineModal, setShowWineModal] = useState(false);
            const [showSpiritModal, setShowSpiritModal] = useState(false);
            const [pendingCartItem, setPendingCartItem] = useState(null);
            const [wineAck, setWineAck] = useState(false);
            const [spiritAck, setSpiritAck] = useState(false);

            // LCBO-specific state
            const [lcboStoreNumber, setLcboStoreNumber] = useState('');
            const [lcboStoreAddress, setLcboStoreAddress] = useState('');
            const isLCBO = accountCode === 'FT1ZECA6';

            // Settings state
            const [lowInventory, setLowInventory] = useState({});
            const [outOfStock, setOutOfStock] = useState({});
            const [messages, setMessages] = useState({ spiritOfYork: '', grange: '' });
            const [randomSoyImage, setRandomSoyImage] = useState('');
            const [randomGrangeImage, setRandomGrangeImage] = useState('');
            const [isSavingSettings, setIsSavingSettings] = useState(false);

            // ── Amend Order State ──────────────────────────────────────────────
            const [amendSearch, setAmendSearch] = useState('');
            const [amendSelectedAccount, setAmendSelectedAccount] = useState(null);
            const [amendOrders, setAmendOrders] = useState([]);
            const [amendOrdersLoading, setAmendOrdersLoading] = useState(false);
            const [amendSelectedOrder, setAmendSelectedOrder] = useState(null);
            const [amendItems, setAmendItems] = useState([]);
            const [amendDeliveryDate, setAmendDeliveryDate] = useState('');
            const [amendNotes, setAmendNotes] = useState('');
            const [amendIsSubmitting, setAmendIsSubmitting] = useState(false);
            const [amendMessage, setAmendMessage] = useState({ type: '', text: '' });
            const [amendAddProduct, setAmendAddProduct] = useState('');
            const [amendPriceMap, setAmendPriceMap] = useState({});
            const [splitCaseAccounts, setSplitCaseAccounts] = useState([]);
            const [whiskyApprovedAccounts, setWhiskyApprovedAccounts] = useState([]);
            const [settingsLoaded, setSettingsLoaded] = useState(false);
            const [showTechSheet, setShowTechSheet] = useState(null);
            const [techSheetZoom, setTechSheetZoom] = useState(100);
            const [overrideCaseDivisibility, setOverrideCaseDivisibility] = useState(false);
            const [overrideSpiritMinimum, setOverrideSpiritMinimum] = useState(false);
            const [accountSearch, setAccountSearch] = useState('');
            const [splitCaseSearch, setSplitCaseSearch] = useState('');
            const [whiskySearch, setWhiskySearch] = useState('');
            const [productAccessList, setProductAccessList] = useState({});
            const [selectedProductForAccess, setSelectedProductForAccess] = useState('');
            const [selectedAccountForAccess, setSelectedAccountForAccess] = useState('');
            const [productAccessSearch, setProductAccessSearch] = useState('');
            const [productSuppressionList, setProductSuppressionList] = useState({});
            const [selectedProductForSuppression, setSelectedProductForSuppression] = useState('');
            const [selectedAccountForSuppression, setSelectedAccountForSuppression] = useState('');
            const [productSuppressionSearch, setProductSuppressionSearch] = useState('');
            const [overrideShipping, setOverrideShipping] = useState(false);
            const [forceShippingMethod, setForceShippingMethod] = useState('');
            const [showProfitCalc, setShowProfitCalc] = useState(false);
            const [calcProduct, setCalcProduct] = useState(null);
            const [menuPrice, setMenuPrice] = useState('');
            const [pourSize, setPourSize] = useState('1.5');
            const [collections, setCollections] = useState({ spiritOfYork: [], grange: [] });
            const [collectionsLoading, setCollectionsLoading] = useState(false);
            const [overridePickup, setOverridePickup] = useState(false);
            const [promoOrder, setPromoOrder] = useState(false);
            const [mixedPromoMode, setMixedPromoMode] = useState(false);
            const [retailMode, setRetailMode] = useState(false);
            const [orderNotes, setOrderNotes] = useState('');
            const [poNumber, setPoNumber] = useState('');

            // ── DYNAMIC PRODUCTS STATE ────────────────────────────────────────────
            const [products, setProducts] = useState({ 'Spirit of York': [], 'The Grange': [] });
            const [productsLoading, setProductsLoading] = useState(true);
            // ─────────────────────────────────────────────────────────────────────

            // Tech sheets available (product ID -> image filename)
            const techSheets = {
                'spirit-of-york-vodka': './images/tech-sheets/soy-vodka-tech.png',
                'spirit-of-york-aquavit': './images/tech-sheets/soy-aquavit-tech.png',
                'spirit-of-york-coffee-liqueur': './images/tech-sheets/soy-coffee-liqueur-tech.png',
                'spirit-of-york-gin': './images/tech-sheets/soy-gin-tech.png',
                'spirit-of-york-distl-vodka': './images/tech-sheets/distl-vodka-tech.png',
                'spirit-of-york-distl-gin': './images/tech-sheets/distl-gin-tech.png',
                'spirit-of-york-distl-canadian-whisky': './images/tech-sheets/distl-whisky-tech.png',
                'spirit-of-york-distl-flawless-pink-gin': './images/tech-sheets/distl-pink-gin-tech.png',
                'spirit-of-york-distl-ancho-chilli-liqueu': './images/tech-sheets/distl-chili-liqueur-tech.png',
                'spirit-of-york-distl-peach-blueberry-rtd': './images/tech-sheets/distl-seltzer-peach-tech.png',
                'spirit-of-york-distl-raspberry-lemon-rtd': './images/tech-sheets/distl-seltzer-raspberry-tech.png',
                'grange-21-lafontaine-brut': './images/tech-sheets/grange-lafontaine-brut-tech.png',
                'grange-23-aurelia-cabernet-franc': './images/tech-sheets/grange-2023-aurelia-cabernet-tech.png',
                'grange-23-aurelia-pinot-noir': './images/tech-sheets/grange-2023-aurelia-pinot-tech.png',
                'grange-23-aurelia-chardonnay': './images/tech-sheets/grange-2023-aurelia-chardonnay-tech.png',
                'grange-24-estate-cabernet-franc': './images/tech-sheets/grange-2024-cabernet-tech.png',
                'grange-24-estate-pinot-noir': './images/tech-sheets/grange-2024-pinot-tech.png',
                'grange-24-estate-chardonnay': './images/tech-sheets/grange-2024-chardonnay-tech.png',
                'grange-24-farmers-almanac-white': './images/tech-sheets/grange-almanac-white-tech.png',
                'grange-25-almanac-red': './images/tech-sheets/2025 Almanac Red Tech Sheet.png',
                'grange-25-almanac-white': './images/tech-sheets/2025 Almanac White Tech Sheet.png',
                'grange-24-aurelia-syrah': './images/tech-sheets/2024 Aurelia Series Syrah Tech Sheet.png',
                'grange-25-estate-pinot-gris': './images/tech-sheets/2025 Estate Series Pinot Gris Tech Sheet.png',
                'grange-25-estate-riesling': './images/tech-sheets/2025 Estate Series Riesling Tech Sheet.png',
                'grange-25-estate-rose': './images/tech-sheets/2025 Estate Series Rose Tech Sheet.png',
                'grange-25-estate-sauvignon-blanc': './images/tech-sheets/2025 Estate Series Sauvignon Blanc Tech Sheet.png'
            };

            // Bottle images (product ID -> bottle image filename)

            // ── FETCH PRODUCTS FROM GOOGLE SHEET ─────────────────────────────────
            useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        const res = await fetch('https://script.google.com/macros/s/AKfycbzDd7vl7w1hbnzsgbaat7Tch5GK0wMrB7FZwsV3niJiibB8smiHbn78qv6HOBEqyiQ07g/exec?action=getProducts');
                        const data = await res.json();

                        if (data.status !== 'success') throw new Error('Bad response from sheet');

                        const soy = [];
                        const grange = [];

                        data.products.forEach(row => {
                            const caseSize = row.caseSize || 12;
                            const brand = getBrand(row.name);
                            const rawType = (row.type || 'Spirit').trim().toLowerCase();
                            const type = rawType === 'wine' ? 'Wine' :
                                         rawType === 'rtd'  ? 'RTD'  :
                                         rawType === 'case' ? 'Case' : 'Spirit';
                            const access = (row.access || 'Whitelist').trim().toLowerCase()
                                .replace('whitelist', 'Whitelist')
                                .replace('restricted', 'Restricted')
                                .replace('live nation', 'Live Nation')
                                .replace('lcbo', 'LCBO')
                                .replace('duty free', 'Duty Free');

                            const product = {
                                id:             makeProductId(row.name),
                                name:           row.name,
                                price:          row.price,
                                abv:            row.abv || null,
                                size:           row.volume || null,
                                caseSize:       caseSize,
                                casePrice:      type === 'Case' ? row.price : parseFloat((row.price * caseSize).toFixed(2)),
                                isWine:         type === 'Wine',
                                isRTD:          type === 'RTD',
                                isCase:         type === 'Case',
                                access:         access,
                                photoId:        row.photoId || null,
                            };

                            if (brand === 'The Grange') grange.push(product);
                            else soy.push(product);
                        });

                        setProducts({ 'Spirit of York': soy, 'The Grange': grange });
                        console.log('Products loaded from sheet — SOY:', soy.length, 'Grange:', grange.length);
                    } catch (err) {
                        console.error('Failed to load products from sheet:', err);
                        // Products remain empty arrays; portal shows "no products" rather than crashing
                    } finally {
                        setProductsLoading(false);
                    }
                };

                fetchProducts();
            }, []);
            // ─────────────────────────────────────────────────────────────────────

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const code = params.get('account');

                if (!code) return;
                
                // Lock in admin status from the URL — never gets reset even when
                // accountCode changes (e.g., admin selecting an account to order for)
                if (code === 'ADMIN001') {
                    setAdminMode(true);
                }

                const csvPaths = [
                    './12-trinity-all-accounts.csv',
                    '12-trinity-all-accounts.csv',
                    '/order-portal/12-trinity-all-accounts.csv'
                ];

                const tryLoadCSV = async (path) => {
                    try {
                        const res = await fetch(path);
                        if (!res.ok) throw new Error('Not found');
                        const csv = await res.text();

                        const lines = csv.split('\n');
                        const accounts = [];
                        let foundAccount = false;

                        for (let i = 1; i < lines.length; i++) {
                            const line = lines[i].trim();
                            if (!line) continue;

                            const parts = [];
                            let current = '';
                            let inQuotes = false;

                            for (let char of line) {
                                if (char === '"') {
                                    inQuotes = !inQuotes;
                                } else if (char === ',' && !inQuotes) {
                                    parts.push(current.trim());
                                    current = '';
                                } else {
                                    current += char;
                                }
                            }
                            parts.push(current.trim());

                            if (parts.length >= 2) {
                                const accCode = parts[0];
                                const accName = parts[1].replace(/^"|"$/g, '');
                                const accType = parts.length >= 4 ? parts[3].replace(/^"|"$/g, '').trim() : 'Regular';
                                const accAddress = parts.length >= 5 ? parts[4].replace(/^"|"$/g, '').trim() : '';
                                const accLicense = parts.length >= 6 ? parts[5].replace(/^"|"$/g, '').trim() : '';
                                accounts.push({ code: accCode, name: accName, type: accType, address: accAddress, license: accLicense });

                                if (accCode === code) {
                                    setAccountCode(code);
                                    setAccountName(accName);
                                    setAccountType(accType);
                                    setAccountAddress(accAddress);
                                    setAccountLicense(accLicense);
                                    foundAccount = true;
                                    console.log('Found account:', accName, 'for code:', code, 'Type:', accType, 'Address:', accAddress, 'License:', accLicense);
                                }
                            }
                        }

                        setAllAccounts(accounts);
                        setCsvLoaded(true);
                        console.log('CSV loaded successfully from:', path);

                        if (!foundAccount) {
                            setAccountCode(code);
                            setAccountName(code);
                            console.warn('Account not found in CSV, using code as name');
                        }

                        return true;
                    } catch (err) {
                        console.log('Failed to load CSV from:', path);
                        return false;
                    }
                };

                (async () => {
                    let loaded = false;
                    for (const path of csvPaths) {
                        if (await tryLoadCSV(path)) {
                            loaded = true;
                            break;
                        }
                    }

                    if (!loaded) {
                        console.error('CSV could not be loaded from any path');
                        setAccountCode(code);
                        setAccountName(code);
                    }
                })();
            }, []);

            // Fetch settings and select random images
            useEffect(() => {
                const fetchSettings = async () => {
                    try {
                        const response = await fetch('https://script.google.com/macros/s/AKfycbzDd7vl7w1hbnzsgbaat7Tch5GK0wMrB7FZwsV3niJiibB8smiHbn78qv6HOBEqyiQ07g/exec?action=getSettings');
                        const data = await response.json();
                        setLowInventory(data.lowInventory || {});
                        setOutOfStock(data.outOfStock || {});
                        setMessages(data.messages || { spiritOfYork: '', grange: '' });
                        setSplitCaseAccounts(data.splitCaseAccounts || []);
                        setWhiskyApprovedAccounts(data.whiskyApprovedAccounts || []);

                        const month = String(date.getMonth() + 1).padStart(2, '0');

                                )}

                                <div className="modal-buttons">
                                    <button
                                        className="modal-btn secondary"
                                        onClick={() => { setShowProfitCalc(false); setCalcProduct(null); setMenuPrice(''); setPourSize('2'); }}
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<OrderPortal />, document.getElementById('root'));
    </script>
</body>
</html>
