<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9f7f4;
            color: #3a3a3a;
            padding-bottom: 200px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #e8e4df;
            color: #3a3a3a;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header .account-name {
            font-size: 16px;
            color: #252f42;
        }

        .delivery-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(139, 125, 107, 0.12);
        }

        .delivery-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #3a3a3a;
        }

        .pickup-note {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            color: #666;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
        }

        .brand-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .brand-tab {
            flex: 1;
            padding: 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .brand-tab:hover {
            border-color: #adb5bd;
        }

        .brand-tab.active {
            /* Styles handled inline for brand-specific colors */
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(139, 125, 107, 0.12);
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: #3a3a3a;
        }

        .product-details {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .product-price {
            color: #8b7d6b;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 20px;
            font-weight: 600;
            color: #3a3a3a;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            border-color: #be835c;
            color: #be835c;
        }

        .qty-display {
            font-size: 18px;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: #be835c;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-to-cart-btn:hover {
            background: #a67250;
        }

        .add-to-cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .cart-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-top: 30px;
            box-shadow: 0 2px 8px rgba(139, 125, 107, 0.12);
        }

        .cart-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #3a3a3a;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .cart-item-details {
            color: #666;
            font-size: 14px;
        }

        .cart-item-price {
            font-weight: 700;
            color: #be835c;
            margin-right: 15px;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-top: 2px solid #252f42;
            margin-top: 20px;
            font-size: 24px;
            font-weight: 700;
        }

        .cart-total-label {
            color: #252f42;
        }

        .cart-total-amount {
            color: #be835c;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #252f42;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: #1a2230;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 {
            color: #252f42;
            margin-bottom: 15px;
        }

        .modal p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .modal ul {
            margin: 10px 0 10px 20px;
        }

        .modal li {
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: #be835c;
            color: white;
        }

        .modal-btn.secondary {
            background: #e0e0e0;
            color: #252f42;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .admin-selector {
            margin-bottom: 25px;
        }

        .admin-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─────────────────────────────────────────────────────────────────────────
        // PRODUCT META — one entry per product.
        // KEY must exactly match Column A in the "Products For Portal" sheet.
        // This object only stores things the sheet can't: ID, brand, flags, access.
        // Prices, ABV, volume, case size, and active status all come from the sheet.
        // To add a new product: add a row in the sheet AND one entry here.
        // ─────────────────────────────────────────────────────────────────────────
        const PRODUCT_META = {
            // ── Spirit of York core ──────────────────────────────────────────────
            'Spirit of York Vodka':                              { id: 'soy-vodka',           brand: 'Spirit of York' },
            'Spirit of York Gin':                                { id: 'soy-gin',             brand: 'Spirit of York' },
            'Spirit of York Whisky':                             { id: 'soy-whisky',          brand: 'Spirit of York', whiskyRestricted: true },
            'Spirit of York Aquavit':                            { id: 'soy-aquavit',         brand: 'Spirit of York', lcboOnly: true },
            'Spirit of York Coffee Liqueur':                     { id: 'soy-coffee',          brand: 'Spirit of York' },
            'Spirit of York Aperitivo':                          { id: 'soy-aperitivo',       brand: 'Spirit of York', allowedAccounts: ['ADMIN001','06FGUAW0'] },
            'Spirit of York Citruscello':                        { id: 'soy-citruscello',     brand: 'Spirit of York', allowedAccounts: ['ADMIN001'] },
            'Spirit of York Purple Gin':                         { id: 'soy-purple-gin',      brand: 'Spirit of York', allowedAccounts: ['NQ7C553C'] },
            // ── DISTL spirits ────────────────────────────────────────────────────
            'Spirit of York: DISTL Vodka':                       { id: 'distl-vodka',         brand: 'Spirit of York' },
            'Spirit of York: DISTL Gin':                         { id: 'distl-gin',           brand: 'Spirit of York' },
            'Spirit of York: DISTL Canadian Whisky':             { id: 'distl-whisky',        brand: 'Spirit of York' },
            'Spirit of York: DISTL Flawless Pink Gin':           { id: 'distl-pink',          brand: 'Spirit of York' },
            'Spirit of York: DISTL Ancho Chilli Liqueur':        { id: 'distl-chili',         brand: 'Spirit of York', allowedAccounts: ['ADMIN001','06FGUAW0'] },
            'Spirit of York: DISTL Sweet Tea Liqueur':           { id: 'distl-sweet-tea',     brand: 'Spirit of York', allowedAccounts: ['ADMIN001'] },
            'Spirit of York: DISTL Orange Liqueur':              { id: 'distl-orange-liq',    brand: 'Spirit of York', allowedAccounts: ['ADMIN001','06FGUAW0'] },
            'Spirit of York: DISTL Signature Gin':               { id: 'distl-signature-gin', brand: 'Spirit of York', allowedAccounts: ['3YBBY8SD','1B2VHWPH','NBYUKKMV','4GALK4CC','0PHR4APK','4GRBZBC4','RFMRTZ9J','VLY88JJW','0IB5SNPS','4O4TUYR5','9K0KUXPA','LAX2DYA3'] },
            'Spirit of York: DISTL Orange Vodka':                { id: 'distl-orange-vodka',  brand: 'Spirit of York', allowedAccounts: ['ZNH52R5H','C3AD3EZM'] },
            'Spirit of York: DISTL Cherry Vodka':                { id: 'distl-cherry-vodka',  brand: 'Spirit of York', allowedAccounts: ['ZNH52R5H','C3AD3EZM'] },
            'Spirit of York: DISTL Sour Poet':                   { id: 'distl-sour-poet',     brand: 'Spirit of York', allowedAccounts: ['NQ7C553C'] },
            // ── DISTL RTDs ───────────────────────────────────────────────────────
            'Spirit of York: DISTL Peach Blueberry RTD':         { id: 'distl-peach-rtd',     brand: 'Spirit of York', isRTD: true },
            'Spirit of York: DISTL Raspberry Lemon RTD':         { id: 'distl-rasp-rtd',      brand: 'Spirit of York', isRTD: true },
            'Spirit of York: DISTL Pear Yuzu RTD':               { id: 'distl-pear-yuzu-rtd', brand: 'Spirit of York', isRTD: true, allowedAccounts: ['ADMIN001'] },
            // ── Duty Free cases (Pearson / Queenston) ────────────────────────────
            'Spirit of York Vodka Case':                         { id: 'case-vodka',          brand: 'Spirit of York', allowedAccounts: ['844YRPRC','7FTWKS5S'] },
            'Spirit of York Gin Case':                           { id: 'case-gin',            brand: 'Spirit of York', allowedAccounts: ['844YRPRC','7FTWKS5S'] },
            'Spirit of York Whisky Case':                        { id: 'case-whisky',         brand: 'Spirit of York', allowedAccounts: ['844YRPRC','7FTWKS5S'] },
            'Spirit of York: DISTL Flawless Pink Gin Case (12)': { id: 'case-distl-pink',     brand: 'Spirit of York', allowedAccounts: ['844YRPRC','7FTWKS5S'] },
            'Spirit of York: DISTL Gin Case':                    { id: 'case-distl-gin',      brand: 'Spirit of York', allowedAccounts: ['844YRPRC','7FTWKS5S'] },
            // ── The Grange wines ─────────────────────────────────────────────────
            'Grange 19 Riesling':                                { id: 'grange-19-riesling',   brand: 'The Grange', isWine: true },
            'Grange 24 Farmers Almanac White':                   { id: 'grange-almanac-white', brand: 'The Grange', isWine: true },
            'Grange 24 Farmers Almanac Red':                     { id: 'grange-almanac-red',   brand: 'The Grange', isWine: true },
            'Grange 24 Estate Chardonnay':                       { id: 'grange-estate-chard',  brand: 'The Grange', isWine: true },
            'Grange 24 Estate Cabernet Franc':                   { id: 'grange-estate-cab',    brand: 'The Grange', isWine: true },
            'Grange 24 Estate Pinot Noir':                       { id: 'grange-estate-pinot',  brand: 'The Grange', isWine: true },
            'Grange 23 Estate Gamay':                            { id: 'grange-23-gamay',      brand: 'The Grange', isWine: true },
            'Grange 23 Aurelia Chardonnay':                      { id: 'grange-aurelia-chard', brand: 'The Grange', isWine: true },
            'Grange 23 Aurelia Pinot Noir':                      { id: 'grange-aurelia-pinot', brand: 'The Grange', isWine: true },
            'Grange 23 Aurelia Cabernet Franc':                  { id: 'grange-aurelia-cab',   brand: 'The Grange', isWine: true },
            'Grange 21 Aurelia Lafontaine Brut':                 { id: 'grange-lafontaine',    brand: 'The Grange', isWine: true },
        };
        // ─────────────────────────────────────────────────────────────────────────

        function OrderPortal() {
            const [accountCode, setAccountCode] = useState('');
            const [accountName, setAccountName] = useState('');
            const [accountType, setAccountType] = useState('');
            const [accountAddress, setAccountAddress] = useState('');
            const [selectedAccountForAuth, setSelectedAccountForAuth] = useState('ADMIN001');
            const [selectedAccountForWhisky, setSelectedAccountForWhisky] = useState('ADMIN001');
            const [allAccounts, setAllAccounts] = useState([]);
            const [selectedBrand, setSelectedBrand] = useState('Spirit of York');
            const [deliveryDate, setDeliveryDate] = useState('');
            const [customDeliveryDate, setCustomDeliveryDate] = useState('');
            const [cart, setCart] = useState([]);
            const [quantities, setQuantities] = useState({});
            const [editingQuantity, setEditingQuantity] = useState(null);
            const [tempQuantity, setTempQuantity] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [message, setMessage] = useState({ type: '', text: '' });
            const [showWineModal, setShowWineModal] = useState(false);
            const [showSpiritModal, setShowSpiritModal] = useState(false);
            const [pendingCartItem, setPendingCartItem] = useState(null);
            const [wineAck, setWineAck] = useState(false);
            const [spiritAck, setSpiritAck] = useState(false);

            // LCBO-specific state
            const [lcboStoreNumber, setLcboStoreNumber] = useState('');
            const [lcboStoreAddress, setLcboStoreAddress] = useState('');
            const isLCBO = accountCode === 'FT1ZECA6';

            // Settings state
            const [lowInventory, setLowInventory] = useState({});
            const [outOfStock, setOutOfStock] = useState({});
            const [messages, setMessages] = useState({ spiritOfYork: '', grange: '' });
            const [randomSoyImage, setRandomSoyImage] = useState('');
            const [randomGrangeImage, setRandomGrangeImage] = useState('');
            const [isSavingSettings, setIsSavingSettings] = useState(false);
            const [splitCaseAccounts, setSplitCaseAccounts] = useState([]);
            const [whiskyApprovedAccounts, setWhiskyApprovedAccounts] = useState([]);
            const [settingsLoaded, setSettingsLoaded] = useState(false);
            const [showTechSheet, setShowTechSheet] = useState(null);
            const [techSheetZoom, setTechSheetZoom] = useState(100);
            const [overrideCaseDivisibility, setOverrideCaseDivisibility] = useState(false);
            const [accountSearch, setAccountSearch] = useState('');
            const [splitCaseSearch, setSplitCaseSearch] = useState('');
            const [whiskySearch, setWhiskySearch] = useState('');
            const [productAccessList, setProductAccessList] = useState({});
            const [selectedProductForAccess, setSelectedProductForAccess] = useState('');
            const [selectedAccountForAccess, setSelectedAccountForAccess] = useState('');
            const [productAccessSearch, setProductAccessSearch] = useState('');
            const [overrideShipping, setOverrideShipping] = useState(false);
            const [forceShippingMethod, setForceShippingMethod] = useState('');
            const [showProfitCalc, setShowProfitCalc] = useState(false);
            const [calcProduct, setCalcProduct] = useState(null);
            const [menuPrice, setMenuPrice] = useState('');
            const [pourSize, setPourSize] = useState('1.5');
            const [collections, setCollections] = useState({ spiritOfYork: [], grange: [] });
            const [collectionsLoading, setCollectionsLoading] = useState(false);
            const [overridePickup, setOverridePickup] = useState(false);
            const [promoOrder, setPromoOrder] = useState(false);
            const [orderNotes, setOrderNotes] = useState('');
            const [poNumber, setPoNumber] = useState('');

            // ── DYNAMIC PRODUCTS STATE ────────────────────────────────────────────
            const [products, setProducts] = useState({ 'Spirit of York': [], 'The Grange': [] });
            const [productsLoading, setProductsLoading] = useState(true);
            // ─────────────────────────────────────────────────────────────────────

            // Tech sheets available (product ID -> image filename)
            const techSheets = {
                'soy-vodka': './images/tech-sheets/soy-vodka-tech.png',
                'soy-aquavit': './images/tech-sheets/soy-aquavit-tech.png',
                'soy-coffee': './images/tech-sheets/soy-coffee-liqueur-tech.png',
                'soy-gin': './images/tech-sheets/soy-gin-tech.png',
                'distl-vodka': './images/tech-sheets/distl-vodka-tech.png',
                'distl-gin': './images/tech-sheets/distl-gin-tech.png',
                'distl-whisky': './images/tech-sheets/distl-whisky-tech.png',
                'distl-pink': './images/tech-sheets/distl-pink-gin-tech.png',
                'distl-chili': './images/tech-sheets/distl-chili-liqueur-tech.png',
                'distl-peach-rtd': './images/tech-sheets/distl-seltzer-peach-tech.png',
                'distl-rasp-rtd': './images/tech-sheets/distl-seltzer-raspberry-tech.png',
                'grange-lafontaine': './images/tech-sheets/grange-lafontaine-brut-tech.png',
                'grange-aurelia-cab': './images/tech-sheets/grange-2023-aurelia-cabernet-tech.png',
                'grange-aurelia-pinot': './images/tech-sheets/grange-2023-aurelia-pinot-tech.png',
                'grange-aurelia-chard': './images/tech-sheets/grange-2023-aurelia-chardonnay-tech.png',
                'grange-estate-cab': './images/tech-sheets/grange-2024-cabernet-tech.png',
                'grange-estate-pinot': './images/tech-sheets/grange-2024-pinot-tech.png',
                'grange-estate-chard': './images/tech-sheets/grange-2024-chardonnay-tech.png',
                'grange-almanac-white': './images/tech-sheets/grange-almanac-white-tech.png'
            };

            // Bottle images (product ID -> bottle image filename)
            const bottleImages = {
                'soy-vodka': './images/bottles/SOY-Vodka.png',
                'soy-aquavit': './images/bottles/SOY-Aquavit.png',
                'soy-coffee': './images/bottles/SOY-Coffee.png',
                'soy-gin': './images/bottles/SOY-Gin.png',
                'distl-vodka': './images/bottles/DISTL-Vodka.png',
                'distl-gin': './images/bottles/DISTL-Gin.png',
                'distl-whisky': './images/bottles/DISTL-CanadianWhisky.png',
                'distl-pink-gin': './images/bottles/DISTL-PinkGin.png',
                'distl-chili': './images/bottles/DISTL-AnchoChilli.png',
                'distl-seltzer-peach': './images/bottles/DISTL-PeachBlueberryRTD.png',
                'distl-seltzer-raspberry': './images/bottles/DISTL-RaspberryLemonRTD.png',
                'grange-lafontaine': './images/bottles/Grange-2021-Aurelia-Lafontaine.png',
                'grange-aurelia-cab': './images/bottles/Grange-2023-Aurelia-CabernetFranc.png',
                'grange-aurelia-pinot': './images/bottles/Grange-2023-Aurelia-PinotNoir.png',
                'grange-aurelia-chard': './images/bottles/Grange-2023-Aurelia-Chardonnay.png',
                'grange-estate-cab': './images/bottles/Grange-2024-Estate-CabernetFranc.png',
                'grange-estate-pinot': './images/bottles/Grange-2024-Estate-PinotNoir.png',
                'grange-estate-chard': './images/bottles/Grange-2024-Estate-Chardonnay.png',
                'grange-almanac-white': './images/bottles/Grange-2024-Almanac-White.png'
            };

            // ── FETCH PRODUCTS FROM GOOGLE SHEET ─────────────────────────────────
            useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        const res = await fetch('https://script.google.com/macros/s/AKfycbzDd7vl7w1hbnzsgbaat7Tch5GK0wMrB7FZwsV3niJiibB8smiHbn78qv6HOBEqyiQ07g/exec?action=getProducts');
                        const data = await res.json();

                        if (data.status !== 'success') throw new Error('Bad response from sheet');

                        const soy = [];
                        const grange = [];

                        data.products.forEach(row => {
                            const meta = PRODUCT_META[row.name];
                            if (!meta) {
                                console.warn('Portal: no meta entry for sheet product:', row.name);
                                return;
                            }

                            const caseSize = row.caseSize || 12;
                            const product = {
                                id:               meta.id,
                                name:             row.name,
                                price:            row.price,
                                abv:              row.abv || null,
                                size:             row.volume || null,
                                caseSize:         caseSize,
                                casePrice:        parseFloat((row.price * caseSize).toFixed(2)),
                                isWine:           meta.isWine   || false,
                                isRTD:            meta.isRTD    || false,
                                allowedAccounts:  meta.allowedAccounts  || null,
                                whiskyRestricted: meta.whiskyRestricted || false,
                                lcboOnly:         meta.lcboOnly || false,
                            };

                            if (meta.brand === 'The Grange') grange.push(product);
                            else soy.push(product);

                        const accounts = [];
                        let foundAccount = false;

                            let current = '';
                            let inQuotes = false;

                            for (let char of line) {
                                if (char === '"') {
                                    inQuotes = !inQuotes;
                                } else if (char === ',' && !inQuotes) {
                                    parts.push(current.trim());
                                    current = '';
                                } else {
                                    current += char;

                                                        (quantities[product.id] || 0) / product.caseSize
                                                    ) : (
                                                        quantities[product.id] || 0
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                        <div style={{ flex: '1' }}></div>
                                        <button
                                            className="qty-btn"
                                            style={{ flex: '1' }}
                                            onClick={() => {
                                                let increment;
                                                if (product.isWine) {
                                                    increment = isSplitCaseAuthorized ? 1 : product.caseSize;
                                                } else if (product.isRTD) {
                                                    increment = product.caseSize;
                                                } else {
                                                    increment = 1;
                                                }
                                                handleQuantityChange(product.id, increment, product.isWine, product.caseSize);
                                            }}
                                        >
                                            +
                                        </button>
                                    </div>

                                    <button
                                        className="add-to-cart-btn"
                                        onClick={() => handleAddToCart(product)}
                                        disabled={!quantities[product.id] || outOfStock[product.id]}
                                        style={{
                                            background: outOfStock[product.id] ? '#999' : (product.id.startsWith('grange-') ? '#f0b8b8' : '#be835c'),
                                            cursor: outOfStock[product.id] ? 'not-allowed' : 'pointer',
                                            opacity: outOfStock[product.id] ? 0.5 : 1
                                        }}
                                        onMouseEnter={(e) => {
                                            if (!outOfStock[product.id]) {
                                                e.target.style.background = product.id.startsWith('grange-') ? '#e5a5a5' : '#a67250';
                                            }
                                        }}
                                        onMouseLeave={(e) => {
                                            if (!outOfStock[product.id]) {
                                                e.target.style.background = product.id.startsWith('grange-') ? '#f0b8b8' : '#be835c';
                                            }
                                        }}
                                    >
                                        {outOfStock[product.id] ? 'Out of Stock' : 'Add to Cart'}
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="cart-section">
                        <h2>Your Order ({cart.length} items)</h2>
                        {cart.length === 0 ? (
                            <div className="empty-cart">Your cart is empty</div>
                        ) : (
                            <>
                                {cart.map((item, index) => (
                                    <div key={index} className="cart-item">
                                        <div className="cart-item-info">
                                            <div className="cart-item-name">{item.name}</div>
                                            <div className="cart-item-details">
                                                Qty: {
                                                    isLCBO ? (
                                                        `${item.quantity / 6} case${item.quantity / 6 !== 1 ? 's' : ''} × $${(item.displayCasePrice || item.casePrice).toFixed(2)}`
                                                    ) : item.isWine ? (
                                                        splitCaseAccounts.includes(accountCode)
                                                            ? `${item.quantity} × $${item.price.toFixed(2)}`
                                                            : `${item.quantity / item.caseSize} × $${item.casePrice.toFixed(2)}`
                                                    ) : item.isRTD ? (
                                                        `${item.quantity / item.caseSize} × $${item.casePrice.toFixed(2)}`
                                                    ) : (
                                                        `${item.quantity} × $${item.price.toFixed(2)}`
                                                    )
                                                }
                                            </div>
                                        </div>
                                        <div className="cart-item-price">${item.subtotal.toFixed(2)}</div>
                                        <button
                                            className="remove-btn"
                                            onClick={() => removeFromCart(index)}
                                        >
                                            Remove
                                        </button>
                                    </div>
                                ))}
                                <div className="cart-total">
                                    <div className="cart-total-label">Total:</div>
                                    <div className="cart-total-amount">${cartTotal.toFixed(2)}</div>
                                </div>
                                <button
                                    className="submit-btn"
                                    onClick={handleSubmitOrder}
                                    disabled={isSubmitting}
                                >
                                    {isSubmitting ? 'Submitting...' : 'Submit Order'}
                                </button>
                            </>
                        )}
                    </div>

                    {showWineModal && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <h3>Wine Delivery Information</h3>
                                <p><strong>Shipnoble picks up in Prince Edward County on Mondays, Wednesdays, and Saturdays.</strong></p>
                                <p>Please note, Shipnoble does not deliver to the GTA on weekends. Pick-ups at The Grange will also be seasonally affected by operating hours.</p>
                                <p><strong>Between May and November:</strong></p>
                                <ul>
                                    <li>Orders placed before noon Monday will reach the GTA that week</li>
                                    <li>Orders placed before noon Wednesday will reach the GTA between Thursday and the following Wednesday</li>
                                    <li>Orders placed before noon Saturday will reach the GTA the following week</li>
                                </ul>
                                <p><strong>Between December and April:</strong></p>
                                <ul>
                                    <li>Orders placed before noon Wednesday will reach the GTA between Thursday and the following Wednesday</li>
                                    <li>Orders placed before noon Saturday will reach the GTA the following week</li>
                                </ul>
                                <p>Local delivery requests (for The Grange) must be in by end of day Wednesday for delivery on Thursday. Our local delivery area is limited to Hastings and Prince Edward Counties.</p>
                                <div className="modal-buttons">
                                    <button
                                        className="modal-btn secondary"
                                        onClick={() => { setShowWineModal(false); setPendingCartItem(null); }}
                                    >
                                        Cancel
                                    </button>
                                    <button className="modal-btn primary" onClick={handleWineAck}>
                                        I Understand
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSpiritModal && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <h3>Spirit Delivery Information</h3>
                                <p>We aim to turn around deliveries in a 48-72 hour window.</p>
                                <p>We deliver Monday, Wednesday, Friday in the GTA. Orders outside the GTA delivery times will vary based on location.</p>
                                <p>In case of emergency, contact your ambassador.</p>
                                <div className="modal-buttons">
                                    <button
                                        className="modal-btn secondary"
                                        onClick={() => { setShowSpiritModal(false); setPendingCartItem(null); }}
                                    >
                                        Cancel
                                    </button>
                                    <button className="modal-btn primary" onClick={handleSpiritAck}>
                                        I Understand
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Tech Sheet Modal */}
                    {showTechSheet && techSheets[showTechSheet] && (
                        <div
                            className="modal-overlay"
                            onClick={() => { setShowTechSheet(null); setTechSheetZoom(100); }}
                            style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0' }}
                        >
                            <div
                                style={{
                                    position: 'relative',
                                    width: '95vw',
                                    height: '95vh',
                                    backgroundColor: '#2c2c2c',
                                    borderRadius: '0',
                                    padding: '0',
                                    boxShadow: '0 4px 20px rgba(0,0,0,0.5)',
                                    display: 'flex',
                                    flexDirection: 'column'
                                }}
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div style={{
                                    position: 'absolute',
                                    top: '20px',
                                    left: '50%',
                                    transform: 'translateX(-50%)',
                                    display: 'flex',
                                    gap: '10px',
                                    alignItems: 'center',
                                    backgroundColor: 'rgba(0,0,0,0.8)',
                                    padding: '12px 20px',
                                    borderRadius: '8px',
                                    zIndex: 10,
                                    boxShadow: '0 2px 10px rgba(0,0,0,0.5)'
                                }}>
                                    <button
                                        onClick={() => setTechSheetZoom(techSheetZoom === 100 ? 125 : 100)}
                                        style={{
                                            background: '#495057',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '4px',
                                            padding: '10px 20px',
                                            cursor: 'pointer',
                                            fontSize: '15px',
                                            fontWeight: '600'
                                        }}
                                    >
                                        {techSheetZoom === 100 ? '🔍 Zoom In' : '🔍 Zoom Out'}
                                    </button>
                                </div>
                                <button
                                    onClick={() => { setShowTechSheet(null); setTechSheetZoom(100); }}
                                    style={{
                                        position: 'absolute',
                                        top: '20px',
                                        right: '20px',
                                        background: '#dc3545',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: '6px',
                                        padding: '12px 24px',
                                        cursor: 'pointer',
                                        fontSize: '18px',
                                        fontWeight: 'bold',
                                        zIndex: 10,
                                        boxShadow: '0 2px 8px rgba(0,0,0,0.3)'
                                    }}
                                >
                                    ✕ Close
                                </button>
                                <div style={{
                                    flex: 1,
                                    overflow: 'auto',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    padding: '80px 20px 20px 20px'
                                }}>
                                    <img
                                        src={techSheets[showTechSheet]}
                                        alt="Product Details"
                                        style={{
                                            maxWidth: techSheetZoom === 100 ? '100%' : 'none',
                                            maxHeight: techSheetZoom === 100 ? '100%' : 'none',
                                            width: techSheetZoom === 100 ? 'auto' : `${techSheetZoom}%`,
                                            height: 'auto',
                                            objectFit: 'contain',
                                            transition: 'width 0.2s ease'
                                        }}
                                    />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Profit Calculator Modal */}
                    {showProfitCalc && calcProduct && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <h3>💰 Profit Calculator</h3>
                                <p style={{ fontWeight: 600, fontSize: '16px', marginBottom: '20px' }}>
                                    {calcProduct.name}
                                </p>

                                {calcProduct.isRTD ? (
                                    <>
                                        <div className="form-group">
                                            <label>Your Menu Price (per can)</label>
                                            <input
                                                type="number"
                                                step="0.01"
                                                value={menuPrice}
                                                onChange={(e) => setMenuPrice(e.target.value)}
                                                placeholder="Enter your menu price"
                                                style={{ width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '6px', fontSize: '16px' }}
                                            />
                                        </div>
                                        {menuPrice && parseFloat(menuPrice) > 0 && (
                                            <div style={{ backgroundColor: '#f8f9fa', padding: '20px', borderRadius: '8px', marginTop: '20px' }}>
                                                <div style={{ marginBottom: '12px', fontSize: '14px' }}>
                                                    <strong>Cost per can:</strong> ${calcProduct.price.toFixed(2)}
                                                </div>
                                                <div style={{ marginBottom: '12px', fontSize: '14px' }}>
                                                    <strong>Menu price:</strong> ${parseFloat(menuPrice).toFixed(2)}
                                                </div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#28a745', padding: '15px', backgroundColor: '#d4edda', borderRadius: '6px', textAlign: 'center' }}>
                                                    Profit per can: ${(parseFloat(menuPrice) - calcProduct.price).toFixed(2)}
                                                </div>
                                                <div style={{ marginTop: '15px', fontSize: '13px', color: '#666', textAlign: 'center' }}>
                                                    Case of {calcProduct.caseSize}: ${((parseFloat(menuPrice) - calcProduct.price) * calcProduct.caseSize).toFixed(2)} profit
                                                </div>
                                            </div>
                                        )}
                                    </>
                                ) : (
                                    <>
                                        <div className="form-group">
                                            <label>Your Menu Price (per cocktail)</label>
                                            <input
                                                type="number"
                                                step="0.01"
                                                value={menuPrice}
                                                onChange={(e) => setMenuPrice(e.target.value)}
                                                placeholder="Enter your menu price"
                                                style={{ width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '6px', fontSize: '16px' }}
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label>Pour Size (oz)</label>
                                            <input
                                                type="number"
                                                step="0.25"
                                                value={pourSize}
                                                onChange={(e) => setPourSize(e.target.value)}
                                                style={{ width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '6px', fontSize: '16px' }}
                                            />
                                        </div>
                                        {menuPrice && parseFloat(menuPrice) > 0 && pourSize && parseFloat(pourSize) > 0 && (
                                            <>
                                                {(() => {
                                                    const sizeStr = calcProduct.size ? calcProduct.size.replace('ml','') : '750';
                                                    const bottleMl = parseFloat(sizeStr) || 750;
                                                    const bottleOz = bottleMl / 29.5735;
                                                    const pour = parseFloat(pourSize);
                                                    const drinksPerBottle = Math.floor(bottleOz / pour);
                                                    const revenuePerBottle = drinksPerBottle * parseFloat(menuPrice);
                                                    const profitPerBottle = revenuePerBottle - calcProduct.price;
                                                    const profitPerDrink = parseFloat(menuPrice) - (calcProduct.price / drinksPerBottle);
                                                    return (
                                                        <div style={{ backgroundColor: '#f8f9fa', padding: '20px', borderRadius: '8px', marginTop: '20px' }}>
                                                            <div style={{ marginBottom: '12px', fontSize: '14px' }}>
                                                                <strong>Drinks per bottle:</strong> {drinksPerBottle} ({pour}oz pours)
                                                            </div>
                                                            <div style={{ marginBottom: '12px', fontSize: '14px' }}>
                                                                <strong>Revenue per bottle:</strong> ${revenuePerBottle.toFixed(2)}
                                                            </div>
                                                            <div style={{ marginBottom: '12px', fontSize: '14px' }}>
                                                                <strong>Cost per bottle:</strong> ${calcProduct.price.toFixed(2)}
                                                            </div>
                                                            <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#28a745', padding: '15px', backgroundColor: '#d4edda', borderRadius: '6px', textAlign: 'center', marginBottom: '10px' }}>
                                                                Profit per bottle: ${profitPerBottle.toFixed(2)}
                                                            </div>
                                                            <div style={{ fontSize: '18px', fontWeight: 'bold', color: '#28a745', textAlign: 'center' }}>
                                                                Profit per drink: ${profitPerDrink.toFixed(2)}
                                                            </div>
                                                        </div>
                                                    );
                                                })()}
                                            </>
                                        )}
                                    </>
                                )}

                                <div className="modal-buttons">
                                    <button
                                        className="modal-btn secondary"
                                        onClick={() => { setShowProfitCalc(false); setCalcProduct(null); setMenuPrice(''); setPourSize('2'); }}
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<OrderPortal />, document.getElementById('root'));
    </script>
</body>
</html>
